{{ define "main" }}
<section class="games-header">
	<h1>Games</h1>
	<p class="games-description">Games developed by OtherMythos</p>
</section>

<section class="games-list">
	{{ range .Pages }}
	<article class="game-card-preview">
		<h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
		<p class="game-description">{{ .Description }}</p>
		<div class="post-meta">
			<time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
		</div>
		<a href="{{ .Permalink }}" class="read-more">Learn More →</a>
	</article>
	{{ end }}
</section>
{{ end }}
