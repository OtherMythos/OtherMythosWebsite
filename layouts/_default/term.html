{{ define "main" }}
<section class="taxonomy-page">
	<h1>{{ .Title }}</h1>

	{{ if .Pages }}
	<div class="taxonomy-list">
		<ul>
		{{ range .Pages }}
			<li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
		{{ end }}
		</ul>
	</div>
	{{ else }}
		<p>No items found for this {{ .Kind }}.</p>
	{{ end }}

	<p class="back-to-blog"><a href="/blog/">← Back to blog</a></p>
</section>
{{ end }}
